name: Publish OTA Updates

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ota-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Publish update to preview channel
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest update \
            --channel preview \
            --message "Preview OTA: ${GITHUB_SHA}" \
            --non-interactive

      - name: Publish update to production channel
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest update \
            --channel production \
            --message "Production OTA: ${GITHUB_SHA}" \
            --non-interactive