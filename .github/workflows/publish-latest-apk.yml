name: Deploy Web & Trigger APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-and-trigger-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Export website
        run: |
          npx expo export --platform web

      - name: Deploy website to Expo Hosting (production)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest deploy --prod --non-interactive

      - name: Trigger APK build via EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json > build-output.json

          BUILD_ID=$(jq -r '.[0].id' build-output.json)
          BUILD_DETAILS_URL=$(jq -r '.[0].buildDetailsPageUrl // empty' build-output.json)

          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "Could not resolve build ID from EAS build output." >&2
            cat build-output.json >&2
            exit 1
          fi

          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"
          echo "BUILD_DETAILS_URL=$BUILD_DETAILS_URL" >> "$GITHUB_ENV"

      - name: Summarize triggered build
        run: |
          echo "Android build triggered successfully." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- EAS Build ID: $BUILD_ID" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$BUILD_DETAILS_URL" ]; then
            echo "- Build details: $BUILD_DETAILS_URL" >> "$GITHUB_STEP_SUMMARY"
          fi
