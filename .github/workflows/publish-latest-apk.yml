name: Build & Publish APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build APK via EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            --wait > build-output.json

          APK_URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // .[0].artifacts.buildUrl' build-output.json)
          BUILD_ID=$(jq -r '.[0].id' build-output.json)

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "Could not resolve APK URL from EAS build output." >&2
            cat build-output.json >&2
            exit 1
          fi

          echo "APK_URL=$APK_URL" >> "$GITHUB_ENV"
          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"

      - name: Download APK
        run: |
          mkdir -p release-assets
          curl -L "$APK_URL" -o release-assets/SplitKaro-latest.apk
          ls -lh release-assets

      - name: Generate release tag
        run: |
          TAG="v$(date -u +'%Y%m%d-%H%M%S')"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: SplitKaro ${{ env.RELEASE_TAG }}
          body: |
            ## Download

            Tap **SplitKaro-latest.apk** below to download and install on Android.

            ### Android Install Steps
            1. Download `SplitKaro-latest.apk` from Assets below.
            2. Open the file on your Android phone.
            3. If prompted, allow installation from unknown sources.
            4. Tap **Install** → **Open**.

            ---
            - EAS Build ID: ${{ env.BUILD_ID }}
          files: release-assets/SplitKaro-latest.apk

      - name: Deploy website to Expo Hosting (production)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest deploy --prod --non-interactive
